
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Hood Lens</title><style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.header {
  padding:20px 40px;
  font-size:26px;
  font-weight:bold;
  color:#00c805;
  border-bottom:1px solid #222;
}

.container {
  padding:40px;
}

.form {
  background:#121821;
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
  width:320px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  background:#1c2430;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#00c805;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
  gap:20px;
}

.card {
  background:#121821;
  padding:20px;
  border-radius:12px;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.03);
}

.card h3 {
  margin:0;
}

.card p {
  color:#aaa;
}

a {
  color:#00c805;
  text-decoration:none;
}

.badge {
  font-size:12px;
  color:#00c805;
}
</style></head><body><div class="header">🟢 Hood Lens</div><div class="container"><div class="form">
<h3>Add Project</h3><input id="name" placeholder="Project Name">
<input id="symbol" placeholder="Symbol">
<input id="website" placeholder="Website">
<textarea id="desc" placeholder="Description"></textarea><button onclick="addProject()">List Project</button>

</div><h2>Projects</h2>
<div class="grid" id="list"></div></div><script>

// load from storage
let projects = JSON.parse(localStorage.getItem("projects")) || [];

function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
}

function addProject() {
  const project = {
    name: document.getElementById("name").value,
    symbol: document.getElementById("symbol").value,
    website: document.getElementById("website").value,
    desc: document.getElementById("desc").value,
    date: new Date().toLocaleDateString()
  };

  if (!project.name) {
    alert("Project name required!");
    return;
  }

  projects.unshift(project);
  save();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  projects.forEach(p => {
    list.innerHTML += `
      <div class="card">
        <h3>${p.name} (${p.symbol})</h3>
        <p class="badge">Listed: ${p.date}</p>
        <p>${p.desc}</p>
        <a href="${p.website}" target="_blank">Visit →</a>
      </div>
    `;
  });
}

render();

</script></body>
</html>
