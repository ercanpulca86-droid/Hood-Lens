
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hood Lens</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d1117;
  color:white;
}

header {
  padding:15px;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #222;
}

.container {
  padding:15px;
}

.card {
  background:#161b22;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0d1117;
  color:white;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#00ffae;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>Hood Lens 🚀</header>

<div class="container">

<div class="card">
<h3>Add Project</h3>

<input id="name" placeholder="Project Name">
<input id="symbol" placeholder="Token Symbol">
<input id="website" placeholder="Website">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="addProject()">Add Project</button>
</div>

<div id="list"></div>

</div>

<script>
const supabase = supabase.createClient(
  "https://oeutalivjyhwefzajpht.supabase.co",
  "sb_publishable_USS3GzzZ6i0w2xP4oh0TEA_TW0WA1Wp"
);

async function loadProjects() {
  const { data, error } = await supabase
    .from('projects')
    .select('*')
    .order('id', { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  let html = "";
  data.forEach(p => {
    html += `
      <div class="card">
        <h3>${p.name} (${p.symbol})</h3>
        <p>${p.description}</p>
        <a href="${p.website}" target="_blank">Visit</a>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function addProject() {
  const name = document.getElementById("name").value;
  const symbol = document.getElementById("symbol").value;
  const website = document.getElementById("website").value;
  const description = document.getElementById("desc").value;

  await supabase.from('projects').insert([
    { name, symbol, website, description }
  ]);

  loadProjects();
}

loadProjects();
</script>

</body>
</html>
