
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Hood Lens</title><style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.header {
  padding:20px 40px;
  font-size:26px;
  font-weight:bold;
  color:#00c805;
  border-bottom:1px solid #222;
}

.container {
  padding:40px;
}

.form {
  background:#121821;
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
  width:320px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  background:#1c2430;
  color:white;
}

button {
  padding:10px;
  background:#00c805;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

.delete {
  background:red;
}

.feature {
  background:gold;
  color:black;
}

.search {
  margin-bottom:20px;
  padding:10px;
  width:300px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
  gap:20px;
}

.card {
  background:#121821;
  padding:20px;
  border-radius:12px;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.03);
}

.badge {
  font-size:12px;
  color:#00c805;
}

.featured {
  border:2px solid gold;
}
</style></head><body><div class="header">🟢 Hood Lens</div><div class="container"><div class="form">
<h3>Add Project</h3><input id="name" placeholder="Project Name">
<input id="symbol" placeholder="Symbol">
<input id="website" placeholder="Website">
<textarea id="desc" placeholder="Description"></textarea><button onclick="addProject()">List Project</button>

</div><input class="search" placeholder="Search..." oninput="render(this.value)"><h2>Projects</h2>
<div class="grid" id="list"></div></div><script>

let projects = JSON.parse(localStorage.getItem("projects")) || [];

function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
}

function addProject() {
  const project = {
    name: name.value,
    symbol: symbol.value,
    website: website.value,
    desc: desc.value,
    featured: false,
    date: new Date().toLocaleDateString()
  };

  if (!project.name) return alert("Name gerekli");

  projects.unshift(project);
  save();
  render();
}

function deleteProject(index) {
  projects.splice(index,1);
  save();
  render();
}

function toggleFeature(index) {
  projects[index].featured = !projects[index].featured;
  save();
  render();
}

function render(search="") {
  const list = document.getElementById("list");
  list.innerHTML = "";

  projects
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => b.featured - a.featured)
    .forEach((p, i) => {
      list.innerHTML += `
        <div class="card ${p.featured ? 'featured':''}">
          <h3>${p.name} (${p.symbol})</h3>
          <p class="badge">${p.date}</p>
          <p>${p.desc}</p>
          <a href="${p.website}" target="_blank">Visit</a><br><br>

          <button class="feature" onclick="toggleFeature(${i})">
            ⭐ Feature
          </button>

          <button class="delete" onclick="deleteProject(${i})">
            Delete
          </button>
        </div>
      `;
    });
}

render();

</script></body>
</html>
